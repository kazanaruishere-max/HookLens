name = "hooklens-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
FRONTEND_URL = "http://localhost:3000"

# Secrets set via: wrangler secret put <KEY>
# JWT_SECRET
# ENCRYPTION_KEY
# DATABASE_URL
# UPSTASH_REDIS_REST_URL
# UPSTASH_REDIS_REST_TOKEN
# OPENROUTER_API_KEY

[triggers]
crons = ["*/15 * * * *"]
